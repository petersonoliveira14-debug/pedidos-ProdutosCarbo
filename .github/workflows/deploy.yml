name: Sync Bling + Deploy

on:
  schedule:
    - cron: '0 9,15,21 * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-bling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Fetch Bling data
        env:
          BLING_CLIENT_ID: ${{ secrets.BLING_CLIENT_ID }}
          BLING_CLIENT_SECRET: ${{ secrets.BLING_CLIENT_SECRET }}
          BLING_REFRESH_TOKEN: ${{ secrets.BLING_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/fetch_bling.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pedidos.json data/meta.json data/historico/ data/vendedores.json
          git diff --staged --quiet || git commit -m "chore: sync Bling $(date +'%d/%m/%Y %H:%M')"
          git push

  notify-failure:
    runs-on: ubuntu-latest
    needs: sync-bling
    if: failure()
    steps:
      - name: Send failure notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "[Grupo Carbo] ❌ Falha no sync Bling – ${{ github.run_id }}"
          to: ${{ secrets.MAIL_USER }}
          from: Dashboard Grupo Carbo <${{ secrets.MAIL_USER }}>
          body: |
            O workflow de sincronização com o Bling falhou.

            Repositório : ${{ github.repository }}
            Branch      : ${{ github.ref_name }}
            Run ID      : ${{ github.run_id }}
            Hora        : ${{ github.event.head_commit.timestamp }}

            Acesse os logs em:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
